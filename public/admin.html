<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — TymeGlobal NMS</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>

<!-- Login screen -->
<div id="login-screen" style="display:flex;align-items:center;justify-content:center;flex:1;min-height:100vh;">
  <div class="login-card">
    <h2>NMS Admin</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%">Sign in</button>
      <div class="error" id="login-error"></div>
    </form>
    <div style="text-align:center;color:var(--text-light);font-size:12px;margin:12px 0;">— or —</div>
    <button id="google-login-btn" class="google-btn" style="display:none">Sign in with Google</button>
    <div style="margin-top:16px;text-align:center;">
      <a href="/" style="font-size:12px;color:var(--teal);">← Back to NMS</a>
    </div>
  </div>
</div>

<!-- Admin app (hidden until logged in) -->
<div id="admin-app" style="display:none;flex-direction:column;min-height:100vh;">

  <header id="admin-header">
    <h1>TymeGlobal NMS — Admin</h1>
    <div class="spacer"></div>
    <a href="/">← View site</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div id="admin-layout">
    <!-- Sidebar -->
    <div id="sidebar">
      <h3>Pages</h3>
      <div id="page-list"></div>
      <button class="add-page-btn" onclick="addPage()">+ Add page</button>
      <hr class="sidebar-sep" />
      <div class="users-item" onclick="selectUsers()">Users</div>
    </div>

    <!-- Main panel -->
    <div id="admin-main">
      <p class="no-items">Select a page from the sidebar.</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/admin.js"></script>
</body>
</html>
